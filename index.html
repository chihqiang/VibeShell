<!doctype html>
<html lang="zh" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeShell</title>
    <style>
      :root, .light {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 200 100% 45%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: var(--primary);
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 200 100% 45%;
        --radius: 0.65rem;

        --sidebar-width: 220px;
        --top-tabs-height: 36px;
      }

      .dark {
        --background: 220 28% 8%;
        --foreground: 210 40% 95%;
        --card: 220 22% 12%;
        --card-foreground: 210 40% 95%;
        --popover: 220 22% 12%;
        --popover-foreground: 210 40% 95%;
        --primary: 200 100% 61%;
        --primary-foreground: 220 40% 96%;
        --secondary: 220 16% 16%;
        --secondary-foreground: 210 40% 90%;
        --muted: 220 16% 16%;
        --muted-foreground: 220 10% 70%;
        --accent: var(--primary);
        --accent-foreground: 220 40% 96%;
        --destructive: 0 70% 50%;
        --destructive-foreground: 210 40% 96%;
        --border: 220 22% 18%;
        --input: 220 22% 18%;
        --ring: 200 100% 61%;
      }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: hsl(var(--muted-foreground) / 0.3);
        border-radius: 99px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: hsl(var(--muted-foreground) / 0.5);
        background-clip: content-box;
      }
      ::-webkit-scrollbar-corner { background: transparent; }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('vibeshell-theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
      })();
    </script>
  </head>
  <body class="bg-background text-foreground overflow-hidden antialiased h-screen w-screen">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
